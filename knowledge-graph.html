<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Intelligence Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0b0f14;--surface:#131920;--surface2:#1a2230;--border:#243044;--border-l:#2e3d52;
  --tp:#dce8f5;--ts:#7a90a8;--tm:#3d5068;
  --cr:#c9a84c;--ci:#7c6df5;--cil:#b3abff;--cf:#3a9fd6;--cfl:#93d4f5;--cb:#3dbf8f;--cbl:#92e8cc;
  --pw:320px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tp);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:20}
.ht{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;letter-spacing:.03em}
.hs{font-size:9px;color:var(--ts);letter-spacing:.09em;text-transform:uppercase;margin-top:1px}
.hb{font-size:9px;color:var(--cr);border:1px solid var(--cr);padding:3px 9px;letter-spacing:.1em;text-transform:uppercase}

.fbar{display:flex;align-items:center;gap:4px;padding:6px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.fl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;margin-right:3px;flex-shrink:0}
.fb{background:transparent;border:1px solid var(--border);color:var(--ts);padding:3px 10px;font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;border-radius:2px;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--cr);color:var(--cr)}
.fb.active{background:var(--cr);border-color:var(--cr);color:#0b0f14;font-weight:500}
.fb.all.active{background:var(--tp);border-color:var(--tp);color:#0b0f14}
.fdv{width:1px;height:14px;background:var(--border);margin:0 2px}

.main{display:flex;flex:1;overflow:hidden;position:relative}

.sp{width:0;background:var(--surface);border-right:1px solid var(--border);transition:width .3s cubic-bezier(.4,0,.2,1);overflow:hidden;flex-shrink:0;z-index:15;position:relative}
.sp.open{width:var(--pw)}
.spi{width:var(--pw);height:100%;overflow-y:auto;padding:18px 16px 26px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.spi::-webkit-scrollbar{width:3px}
.spi::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.spc{position:absolute;top:10px;right:10px;background:transparent;border:1px solid var(--border);color:var(--ts);width:20px;height:20px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:all .15s}
.spc:hover{border-color:var(--tp);color:var(--tp)}
.stag{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--tm);margin-bottom:6px}
.sbar{width:26px;height:3px;border-radius:2px;margin-bottom:11px}
.stit{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;line-height:1.3;margin-bottom:4px}
.ssub{font-size:11px;color:var(--ts);line-height:1.75;margin-bottom:14px}
.sdiv{border:none;border-top:1px solid var(--border);margin:10px 0 8px}
.slbl{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--tm);margin-bottom:6px}
.snl{display:flex;flex-direction:column;gap:2px}
.sni{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ts);padding:2px 0}
.sdt{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.spl{display:flex;flex-direction:column;gap:4px;margin-top:2px}
.spv{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:6px 9px}
.spn{font-weight:500;font-size:11px;margin-bottom:1px;color:var(--tp)}
.spd{font-size:9px;color:var(--ts)}
.sem{font-size:10px;color:var(--tm);font-style:italic}

#gc{flex:1;position:relative;overflow:hidden}
svg{width:100%;height:100%}
.lkt0{stroke-width:2.2;fill:none;stroke-opacity:.55}
.lkt1{stroke-width:1.5;fill:none;stroke-opacity:.38}
.lkt2{stroke-width:.9;fill:none;stroke-opacity:.25}
.lk.fd{opacity:.04!important}
.nd circle{cursor:pointer;transition:filter .15s}
.nd text{pointer-events:none;font-family:'DM Sans',sans-serif}
.nd.fd{opacity:.06}
.nd.fd text{opacity:0}
.nd circle:hover{filter:brightness(1.45) drop-shadow(0 0 5px currentColor)}

#tt{position:fixed;pointer-events:none;opacity:0;transition:opacity .1s;z-index:200;background:var(--surface2);border:1px solid var(--border-l);border-radius:4px;padding:9px 12px;max-width:260px;font-size:11px;line-height:1.65}
#tt.vis{opacity:1}
.ttn{font-weight:500;font-size:12px;color:var(--tp);margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:4px}
.ttr{display:flex;gap:5px;align-items:flex-start;margin-top:3px;font-size:10px}
.tta{flex-shrink:0;margin-top:1px}

.leg{position:absolute;bottom:14px;right:14px;background:var(--surface);border:1px solid var(--border);padding:9px 12px;border-radius:3px;z-index:10}
.legt{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--tm);margin-bottom:5px}
.legi{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ts);margin-bottom:3px}
.legd{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.zb{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:2px;z-index:10}
.zbt{background:var(--surface);border:1px solid var(--border);color:var(--ts);width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:all .15s}
.zbt:hover{border-color:var(--cr);color:var(--cr)}

.stb{padding:4px 20px;border-top:1px solid var(--border);background:var(--surface);font-size:9px;color:var(--tm);flex-shrink:0;display:flex;justify-content:space-between;letter-spacing:.04em}
</style>
</head>
<body>
<header>
  <div><div class="ht">Corporate Intelligence Knowledge Graph</div><div class="hs">Data Relationships &amp; Use Case Navigator</div></div>
  <div class="hb">Mockup v0.4</div>
</header>
<div class="fbar">
  <span class="fl">Use Cases</span>
  <button class="fb all active" data-filter="all">All Nodes</button>
  <div class="fdv"></div>
  <button class="fb" data-filter="credit">Credit Risk</button>
  <button class="fb" data-filter="ma">M&amp;A Diligence</button>
  <button class="fb" data-filter="peer">Peer Benchmarking</button>
  <button class="fb" data-filter="kyc">KYC / AML</button>
  <button class="fb" data-filter="fraud">Fraud</button>
  <button class="fb" data-filter="supply">Supply Chain</button>
  <button class="fb" data-filter="lending">Lending</button>
  <button class="fb" data-filter="insurance">P&amp;C Insurance</button>
  <button class="fb" data-filter="sales">Sales &amp; Marketing</button>
  <button class="fb" data-filter="cre">Comm. Real Estate</button>
  <button class="fb" data-filter="climate">Climate Risk</button>
  <button class="fb" data-filter="counterparty">Counterparty Risk</button>
</div>
<div class="main">
  <div class="sp" id="sp">
    <div class="spi" id="spi">
      <button class="spc" id="spc">✕</button>
      <div class="stag" id="stag">Detail</div>
      <div class="sbar" id="sbar"></div>
      <div class="stit" id="stit">—</div>
      <div class="ssub" id="ssub"></div>
      <hr class="sdiv">
      <div class="slbl" id="slbl1">Relationships</div>
      <div id="snl" class="snl"></div>
      <hr class="sdiv">
      <div class="slbl" id="slbl2">Data Providers</div>
      <div id="spl" class="spl"></div>
    </div>
  </div>
  <div id="gc">
    <svg id="graph"></svg>
    <div class="leg">
      <div class="legt">Categories</div>
      <div class="legi"><div class="legd" style="background:var(--cr)"></div>Company</div>
      <div class="legi"><div class="legd" style="background:var(--ci)"></div>Corporate Identity &amp; Structure</div>
      <div class="legi"><div class="legd" style="background:var(--cf)"></div>Financials</div>
      <div class="legi"><div class="legd" style="background:var(--cb)"></div>Business Profile &amp; Operations</div>
    </div>
    <div class="zb">
      <button class="zbt" id="zIn">+</button>
      <button class="zbt" id="zOut">−</button>
      <button class="zbt" id="zReset">⊙</button>
    </div>
  </div>
</div>
<div id="tt">
  <div class="ttn" id="ttn"></div>
  <div class="ttr" id="tri" style="display:none"><span class="tta" style="color:var(--ts)">←</span><span id="ttin" style="color:var(--ts)"></span></div>
  <div class="ttr" id="tro" style="display:none"><span class="tta" style="color:var(--cr)">→</span><span id="ttout" style="color:var(--ts)"></span></div>
</div>
<div class="stb"><span id="stl">Showing all nodes · Hover to explore · Click for detail</span><span id="str">— nodes</span></div>

<script>
// ─── COLORS ──────────────────────────────────────────────────────────────────
const C={root:"#c9a84c",identity:"#7c6df5",financial:"#3a9fd6",biz:"#3dbf8f",il:"#b3abff",fl:"#93d4f5",bl:"#92e8cc"};
function cc(n){
  if(n.tier===0) return C.root;
  if(n.cat==="identity")  return n.tier===1?C.identity:C.il;
  if(n.cat==="financial") return n.tier===1?C.financial:C.fl;
  return n.tier===1?C.biz:C.bl;
}
function nr(n){ return n.tier===0?25:n.tier===1?17:n.tier===2?11:10; }

// ─── NODES ───────────────────────────────────────────────────────────────────
const NODES=[
// T0
{id:"company",label:"Company",tier:0,cat:"root",
 i:"Root entity — no upstream inputs",
 o:"Anchors Corporate Identity & Structure, Financials, and Business Profile & Operations",
 desc:"The central corporate entity. All data domains radiate from this node.",pvs:[]},

// T1
{id:"corp-id",label:"Corporate Identity\n& Structure",tier:1,cat:"identity",
 i:"Receives foundational entity data from company registration and legal filings",
 o:"Branches into Legal Entity, Ownership/UBO, Sanctions, PEP/SOE, Management, and Litigation nodes",
 desc:"Covers the legal, ownership, and governance structure — who owns the entity, how it is governed, and its regulatory standing.",
 pvs:[{n:"Dun & Bradstreet",d:"Entity verification, corporate hierarchy, DUNS registry"},{n:"Bureau van Dijk (Moody's)",d:"Ownership, UBO data, subsidiary mapping"},{n:"LexisNexis",d:"Corporate filings, registered agents, state records"}]},

{id:"fin",label:"Financials",tier:1,cat:"financial",
 i:"Receives financial reports and regulatory filings from the Company",
 o:"Feeds Financial Statements, Bonds & Instruments, and all derived financial metrics",
 desc:"All financial data inputs and derived metrics. Source for credit, lending, M&A, and insurance underwriting.",
 pvs:[{n:"S&P Global Market Intelligence",d:"Financial statements, KPIs, segment data"},{n:"FactSet",d:"Normalized financials, estimates, capital structure"},{n:"Bloomberg",d:"Real-time and historical financial data, debt instruments"}]},

{id:"biz",label:"Business Profile\n& Operations",tier:1,cat:"biz",
 i:"Receives operational disclosures and third-party intelligence about the Company",
 o:"Feeds all operational data nodes: Cyber, ESG, CRE, Customer, Vendor, Transactions, Adverse Media, Climate, Claims, Economic, Sales, and Product data",
 desc:"Operational and market intelligence covering cyber, ESG, real estate, customers, vendors, and other non-financial risk dimensions.",
 pvs:[{n:"Dun & Bradstreet",d:"Business activity, industry classification, location data"},{n:"Refinitiv / LSEG",d:"Industry data, competitor profiles, operational metrics"},{n:"Cortera",d:"Trade payment data, business credit behaviors"}]},

// ─── T2: Identity ─────────────────────────────────────────────────────────────
{id:"legal-entity",label:"Legal Entity Data",tier:2,cat:"identity",
 i:"Sourced from corporate registries, state filings, and company formation documents",
 o:"Legal Entity is the registered foundation that the Ownership / UBO structure is built upon; also feeds KYC/AML Score",
 desc:"Registered name, entity type (LLC, Corp), jurisdiction, registration date, and current status.",
 pvs:[{n:"Dun & Bradstreet",d:"DUNS number, entity verification, legal name registry"},{n:"Refinitiv World-Check",d:"Entity resolution, legal identifiers"},{n:"Acuris / Mergermarket",d:"Corporate registry data, entity history"}]},

{id:"ownership",label:"Ownership / UBO",tier:2,cat:"identity",
 i:"Legal Entity Data establishes the registered entity that is owned or controlled by the Ultimate Beneficial Owner",
 o:"Ownership / UBO data informs Governance Score and KYC/AML Score — revealing who ultimately controls the entity",
 desc:"UBO identification, shareholding structures, subsidiary mapping, and parent/child corporate relationships.",
 pvs:[{n:"Bureau van Dijk (Moody's Orbis)",d:"Global ownership structures, UBO identification, 500M+ entities"},{n:"LexisNexis Bridger",d:"Beneficial ownership, PEP and sanctions linkage"},{n:"Dow Jones Risk & Compliance",d:"Ownership hierarchy, adverse media on owners"}]},

{id:"sanctions",label:"Sanctions &\nWatchlists",tier:2,cat:"identity",
 i:"Fed by global regulatory bodies (OFAC, EU, UN, HMT) publishing sanctioned entity lists",
 o:"Sanctions screening feeds KYC/AML Score — a watchlist match is a direct escalation trigger",
 desc:"Real-time and batch screening against OFAC, EU, UN, HMT, and other global sanctions lists.",
 pvs:[{n:"Refinitiv World-Check",d:"Global sanctions, PEP, adverse media — 6M+ profiles"},{n:"LexisNexis Bridger Insight",d:"Sanctions, watchlists, enforcement databases"},{n:"Dow Jones Risk & Compliance",d:"Regulatory, sanctions, and PEP intelligence"}]},

{id:"pep-soe",label:"PEP / State-Owned\nEntity Data",tier:2,cat:"identity",
 i:"Sourced from government disclosures, legislative records, and regulatory filings",
 o:"PEP / SOE presence feeds KYC/AML Score — triggers enhanced due diligence requirements",
 desc:"Politically Exposed Persons (PEPs) and State-Owned Enterprise (SOE) identification. Flags heightened corruption and regulatory risk.",
 pvs:[{n:"Refinitiv World-Check",d:"PEP profiles, SOE registry, family/associate mapping"},{n:"Dow Jones Risk & Compliance",d:"PEP database, SOE ownership flags"},{n:"ComplyAdvantage",d:"Real-time PEP screening, dynamic SOE classification"}]},

{id:"mgmt-info",label:"Management &\nBoard Info",tier:2,cat:"identity",
 i:"Sourced from company filings, board disclosures, and executive databases",
 o:"Management & Board profiles feed Governance Score — board quality and executive conduct are core governance inputs",
 desc:"Names, roles, tenure, compensation, and background of C-suite executives and board members.",
 pvs:[{n:"BoardEx (LSEG)",d:"Executive and board profiles, relationships, career history"},{n:"ISS Corporate Solutions",d:"Executive compensation, board composition, governance data"},{n:"Equilar",d:"C-suite compensation, board diversity, leadership networks"}]},

{id:"litigation",label:"Litigation &\nLegal Actions",tier:2,cat:"identity",
 i:"Sourced from court records, regulatory enforcement databases, and public legal filings",
 o:"Litigation data feeds KYC/AML Score and Operational Risk Score — legal exposure escalates compliance and operational risk",
 desc:"Pending and historical lawsuits, regulatory fines, enforcement actions, and judgments.",
 pvs:[{n:"LexisNexis CourtLink",d:"Federal and state court records, litigation history"},{n:"PACER (US Courts)",d:"US federal court filings, dockets, judgments"},{n:"Dun & Bradstreet",d:"Legal actions, liens, judgments data"}]},

// ─── T2: Financials ───────────────────────────────────────────────────────────
{id:"fin-stmts",label:"Financial\nStatements",tier:2,cat:"financial",
 i:"Sourced from audited annual and quarterly filings (10-K, 10-Q, IFRS equivalents)",
 o:"Financial Statements feed Leverage Ratio, Revenue Growth, Cash Flow, Credit Risk Score, and Credit Rating as the raw data source for all financial metrics",
 desc:"Income statement, balance sheet, and cash flow statement. Normalized across GAAP, IFRS, and local standards.",
 pvs:[{n:"S&P Global Market Intelligence",d:"Global normalized financials, 150+ years history"},{n:"FactSet",d:"As-reported and normalized financials, restatements"},{n:"Calcbench",d:"XBRL-sourced financials, data quality flags"}]},

{id:"bonds",label:"Bonds &\nInstruments",tier:2,cat:"financial",
 i:"Sourced from debt issuances, SEC EDGAR filings, and exchange disclosures",
 o:"Bonds & Instruments data feeds Market Implied Rating — market-observed spreads reveal investor-perceived credit quality",
 desc:"Debt instrument data covering bond terms, coupon, maturity, covenants, issuance history, and secondary market pricing.",
 pvs:[{n:"Bloomberg",d:"Bond pricing, spreads, issuance data, covenant details"},{n:"ICE Data Services",d:"Fixed income pricing, reference data, bond analytics"},{n:"Refinitiv / LSEG",d:"Debt capital markets data, instrument terms, credit spreads"}]},

{id:"leverage",label:"Leverage Ratio",tier:2,cat:"financial",
 i:"Financial Statements provide the debt and earnings figures for Leverage Ratio (Net Debt/EBITDA, Debt/Equity)",
 o:"Leverage Ratio feeds Credit Risk Score, Credit Rating, and Lending Score — higher leverage increases default probability and loan risk",
 desc:"Net Debt/EBITDA, Debt/Equity, and Interest Coverage ratios.",
 pvs:[{n:"S&P Global",d:"Leverage ratios, capital structure decomposition"},{n:"Moody's CreditView",d:"Leverage analysis within credit assessments"},{n:"Bloomberg",d:"Real-time leverage and coverage ratios"}]},

{id:"rev-growth",label:"Revenue Growth",tier:2,cat:"financial",
 i:"Financial Statements provide historical revenue figures from which growth rates are calculated",
 o:"Revenue Growth feeds M&A Valuation and Peer Benchmark Score — top-line trajectory drives DCF assumptions and relative positioning",
 desc:"Year-over-year and CAGR revenue growth, organic vs. acquired breakdowns, and segment-level trends.",
 pvs:[{n:"S&P Global Market Intelligence",d:"Revenue history, estimates, segment breakdowns"},{n:"FactSet Estimates",d:"Consensus revenue estimates, actuals vs. estimates"},{n:"Visible Alpha",d:"Detailed revenue build-up, granular estimates"}]},

{id:"cashflow",label:"Cash Flow &\nLiquidity",tier:2,cat:"financial",
 i:"Financial Statements are the source of operating, investing, and financing cash flows",
 o:"Cash Flow & Liquidity feeds Credit Risk Score, Credit Rating, and Lending Score — free cash flow generation drives debt serviceability",
 desc:"Free cash flow, operating cash flow, liquidity ratios, and working capital analysis.",
 pvs:[{n:"Moody's Analytics",d:"Cash flow analytics, debt service coverage"},{n:"S&P Global",d:"FCF generation, liquidity stress testing"},{n:"Refinitiv",d:"Cash flow statements, normalized metrics"}]},

// ─── T2: Business Profile ─────────────────────────────────────────────────────
{id:"cyber",label:"Cyber Risk",tier:2,cat:"biz",
 i:"Sourced from external attack surface scans, security rating services, and breach databases",
 o:"Cyber Risk feeds Insurance Risk Score, Operational Risk Score, and Peer Benchmark Score",
 desc:"External attack surface analysis, security ratings, breach history, and vulnerability exposure.",
 pvs:[{n:"BitSight",d:"Security ratings, continuous monitoring, peer comparison"},{n:"SecurityScorecard",d:"10 risk factor ratings, attack surface data"},{n:"RiskRecon (Mastercard)",d:"Third-party risk, vendor cyber exposure"}]},

{id:"esg-data",label:"ESG Data",tier:2,cat:"biz",
 i:"Sourced from company ESG disclosures, third-party assessments, and regulatory filings",
 o:"ESG Data feeds Environmental Score, Social Score, and Governance Score — raw disclosures are transformed into pillar scores",
 desc:"Carbon emissions (Scope 1/2/3), energy use, water consumption, workforce diversity, labor practices, and governance disclosures.",
 pvs:[{n:"Sustainalytics (Moody's)",d:"ESG risk ratings, controversy monitoring, 40K+ companies"},{n:"MSCI ESG Research",d:"ESG ratings, controversy scores, climate data"},{n:"Refinitiv ESG (LSEG)",d:"450+ ESG metrics, carbon data, scores"}]},

// ─── T3: ESG Pillar Scores (sub-nodes of ESG Data) ───────────────────────────
{id:"env-score",label:"Environmental\nScore",tier:3,cat:"biz",
 i:"ESG Data (Scope 1/2/3 emissions, energy use, water, waste) feeds the Environmental Score",
 o:"Environmental Score feeds ESG Score as the 'E' pillar",
 desc:"Quantified environmental performance covering carbon footprint, energy efficiency, water stewardship, and waste management.",
 pvs:[{n:"Sustainalytics (Moody's)",d:"Environmental pillar score, carbon risk rating"},{n:"MSCI ESG",d:"Environmental theme scores, carbon exposure"},{n:"CDP",d:"Climate, water, and forests disclosure scores"}]},

{id:"social-score",label:"Social Score",tier:3,cat:"biz",
 i:"ESG Data (workforce data, labor practices, community impact, supply chain labor) feeds the Social Score",
 o:"Social Score feeds ESG Score as the 'S' pillar",
 desc:"Quantified social performance covering labor practices, workforce diversity, health & safety, community relations, and supply chain standards.",
 pvs:[{n:"Sustainalytics (Moody's)",d:"Social pillar score, controversy assessments"},{n:"MSCI ESG",d:"Social theme scores, human capital data"},{n:"Refinitiv ESG (LSEG)",d:"Social metrics — workforce, diversity, safety KPIs"}]},

{id:"cre-data",label:"CRE Data",tier:2,cat:"biz",
 i:"Sourced from property registries, appraisals, lease databases, and market transaction data",
 o:"CRE Data feeds CRE Score and Insurance Risk Score — property fundamentals and market conditions drive underwriting",
 desc:"Commercial real estate data covering property characteristics, tenants, financials, and market conditions.",
 pvs:[{n:"CoStar Group",d:"CRE property data, lease comps, market analytics"},{n:"MSCI Real Assets (IPD)",d:"Property valuations, performance benchmarks"},{n:"Green Street Advisors",d:"CRE market intelligence, REIT analysis"}]},

// CRE sub-nodes
{id:"cre-parcel",label:"Parcel &\nTitle Data",tier:3,cat:"biz",
 i:"Sourced from county assessor records, title companies, and public land registries",
 o:"Parcel & Title Data feeds CRE Score — ownership history and encumbrances affect collateral quality",
 desc:"Legal descriptions, parcel IDs, ownership history, deed records, easements, liens, and encumbrances.",
 pvs:[{n:"CoreLogic",d:"Parcel data, ownership records, AVM"},{n:"ATTOM Data",d:"Property records, title history, deed data"},{n:"First American",d:"Title data, ownership chain, encumbrance records"}]},

{id:"cre-sqft",label:"Size, Floor Plans\n& Zoning",tier:3,cat:"biz",
 i:"Sourced from property surveys, city planning databases, and building permits",
 o:"Size & Zoning feeds CRE Score — rentable area and permitted use directly determine property income potential",
 desc:"Gross and net rentable area, floor plans, building class, year built, zoning designation, and permitted land uses.",
 pvs:[{n:"CoStar Group",d:"Building specs, floor plans, rentable area data"},{n:"REIS (Moody's Analytics)",d:"Market-level square footage, inventory tracking"},{n:"RealPage",d:"Property specifications, unit mix, amenity data"}]},

{id:"cre-tenants",label:"Tenant &\nLease Data",tier:3,cat:"biz",
 i:"Sourced from lease abstracts, tenant databases, and rent roll filings",
 o:"Tenant & Lease Data feeds CRE Score — tenant quality and lease terms determine income stability",
 desc:"Tenant names, industry, creditworthiness, lease terms, expiration schedule, rent per sq ft, and renewal options.",
 pvs:[{n:"CoStar Group",d:"Lease comps, tenant profiles, market rent data"},{n:"Trepp",d:"CMBS loan data, rent rolls, tenant concentration"},{n:"CompStak",d:"Lease analytics, tenant transaction history"}]},

{id:"cre-noi",label:"NOI / Cap Rate\n& Valuation",tier:3,cat:"biz",
 i:"Tenant & Lease Data and Size/Zoning together determine Net Operating Income and market valuation",
 o:"NOI / Cap Rate feeds CRE Score — income yield and capitalization rate are the primary value drivers",
 desc:"Net Operating Income, cap rate benchmarks, market valuations, DSCR calculations, and LTV ratios.",
 pvs:[{n:"Green Street Advisors",d:"Cap rate research, sector valuation benchmarks"},{n:"MSCI Real Assets",d:"Property-level NOI, IRR, valuation indices"},{n:"Trepp",d:"CMBS loan performance, DSCR, NOI analysis"}]},

{id:"cre-vacancy",label:"Vacancy &\nOccupancy Rate",tier:3,cat:"biz",
 i:"Tenant & Lease Data and market supply data determine vacancy and occupancy levels",
 o:"Vacancy & Occupancy feeds CRE Score — high vacancy reduces income reliability and collateral value",
 desc:"Current occupancy, vacancy rates by submarket, absorption trends, and leasing velocity.",
 pvs:[{n:"CoStar Group",d:"Vacancy tracking, market occupancy by submarket"},{n:"CBRE Research",d:"Market vacancy surveys, occupancy benchmarks"},{n:"REIS (Moody's Analytics)",d:"Vacancy forecasts, supply/demand analytics"}]},

// Customer Data
{id:"cust-data",label:"Customer Data",tier:2,cat:"biz",
 i:"Sourced from CRM systems, third-party data providers, and public consumer databases",

   desc:"360° risk assessment of a counterparty before entering a financial contract, trade, or partnership. Combines credit, legal, operational, and ESG dimensions.",
   nodes:["company","corp-id","fin","biz","legal-entity","ownership","sanctions","pep-soe","mgmt-info","litigation","fin-stmts","leverage","cashflow","adv-media","cyber","esg-score","credit-risk-score","credit-rating","op-risk","kyc-aml"]},
};

// ─── D3 SETUP ─────────────────────────────────────────────────────────────────
const gc=document.getElementById("gc");
const svg=d3.select("#graph");
const g=svg.append("g").attr("class","root");
let W=gc.clientWidth,H=gc.clientHeight;

const zoom=d3.zoom().scaleExtent([.1,5]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);

const ND=NODES.map(n=>({...n}));
const LD=LK.map(([s,t])=>({source:s,target:t}));

// Seed center node
const root=ND.find(n=>n.tier===0);
root.x=W/2; root.y=H/2; root.fx=W/2; root.fy=H/2;
setTimeout(()=>{root.fx=null;root.fy=null;},3000);

const sim=d3.forceSimulation(ND)
  .force("link",d3.forceLink(LD).id(d=>d.id).distance(d=>{
    const st=d.source.tier??0,tt=d.target.tier??0;
    const mx=Math.max(st,tt);
    if(mx<=1) return 200; if(mx===2) return 140; return 100;
  }).strength(0.45))
  .force("charge",d3.forceManyBody().strength(d=>d.tier===0?-800:d.tier===1?-500:-280))
  .force("center",d3.forceCenter(W/2,H/2).strength(0.02))
  .force("collide",d3.forceCollide(d=>nr(d)+28))
  .force("radial0",d3.forceRadial(0,W/2,H/2).strength(d=>d.tier===0?1:0))
  .force("radial1",d3.forceRadial(210,W/2,H/2).strength(d=>d.tier===1?.35:0))
  .force("radial2",d3.forceRadial(400,W/2,H/2).strength(d=>d.tier===2?.12:0))
  .force("radial3",d3.forceRadial(560,W/2,H/2).strength(d=>d.tier===3?.10:0));

const lkSel=g.append("g").selectAll("line")
  .data(LD).enter().append("line")
  .attr("class",d=>{
    const st=d.source.tier??0,tt=d.target.tier??0,mx=Math.max(st,tt);
    return `lk ${mx<=1?"lkt0":mx===2?"lkt1":"lkt2"}`;
  })
  .attr("stroke",d=>{
    const n=ND.find(x=>x.id===(d.source.id??d.source));
    return n?cc(n)+"88":"#2a3441";
  });

const ndSel=g.append("g").selectAll(".nd")
  .data(ND).enter().append("g")
  .attr("class","nd").attr("data-id",d=>d.id)
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

ndSel.append("circle")
  .attr("r",nr)
  .attr("fill",d=>cc(d)+"22")
  .attr("stroke",d=>cc(d))
  .attr("stroke-width",d=>d.tier===0?3:d.tier===1?2.2:d.tier===2?1.5:1.2);

ndSel.each(function(d){
  const el=d3.select(this),parts=d.label.split("\n"),yb=nr(d)+12;
  parts.forEach((p,i)=>{
    el.append("text").text(p)
      .attr("text-anchor","middle").attr("dy",yb+i*10)
      .attr("font-size",d.tier===0?"12px":d.tier===1?"11px":d.tier===2?"10px":"9px")
      .attr("font-weight",d.tier<=1?"500":"300")
      .attr("fill",d.tier===0?"#c9a84c":d.tier===1?cc(d):"#7a90a8");
  });
});

sim.on("tick",()=>{
  lkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
       .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  ndSel.attr("transform",d=>`translate(${d.x},${d.y})`);
});

document.getElementById("str").textContent=`${NODES.length} nodes`;

// ─── TOOLTIP ──────────────────────────────────────────────────────────────────
const tt=document.getElementById("tt");
ndSel
  .on("mousemove",(e,d)=>{
    tt.style.left=(e.clientX+15)+"px"; tt.style.top=(e.clientY-8)+"px";
    document.getElementById("ttn").textContent=d.label.replace("\n"," ");
    const ri=document.getElementById("tri"),ro=document.getElementById("tro");
    if(d.i){document.getElementById("ttin").textContent=d.i;ri.style.display="flex";}
    else ri.style.display="none";
    if(d.o){document.getElementById("ttout").textContent=d.o;ro.style.display="flex";}
    else ro.style.display="none";
    tt.classList.add("vis");
  })
  .on("mouseleave",()=>tt.classList.remove("vis"));

// ─── PANEL ────────────────────────────────────────────────────────────────────
function openPanel({tag,accent,title,subtitle,lbl1,nl,lbl2,pvs}){
  document.getElementById("sp").classList.add("open");
  document.getElementById("stag").textContent=tag;
  document.getElementById("sbar").style.background=accent||"var(--cr)";
  document.getElementById("stit").textContent=title;
  document.getElementById("ssub").textContent=subtitle;
  document.getElementById("slbl1").textContent=lbl1||"Nodes";
  document.getElementById("slbl2").textContent=lbl2||"Data Providers";
  const nel=document.getElementById("snl"); nel.innerHTML="";
  (nl||[]).forEach(it=>{
    const d=document.createElement("div"); d.className="sni";
    d.innerHTML=`<div class="sdt" style="background:${it.color}"></div><span>${it.label}</span>`;
    nel.appendChild(d);
  });
  if(!nl?.length) nel.innerHTML='<div class="sem">—</div>';
  const pel=document.getElementById("spl"); pel.innerHTML="";
  (pvs||[]).forEach(p=>{
    const d=document.createElement("div"); d.className="spv";
    d.innerHTML=`<div class="spn">${p.n}</div><div class="spd">${p.d}</div>`;
    pel.appendChild(d);
  });
  if(!pvs?.length) pel.innerHTML='<div class="sem">—</div>';
  document.getElementById("spi").scrollTop=0;
}

function closePanel(){ document.getElementById("sp").classList.remove("open"); }
document.getElementById("spc").addEventListener("click",e=>{e.stopPropagation();closePanel();});
svg.on("click",closePanel);

ndSel.on("click",(e,d)=>{
  e.stopPropagation();
  const sc=2.2;
  svg.transition().duration(450).call(zoom.transform,
    d3.zoomIdentity.translate(W/2-d.x*sc,H/2-d.y*sc).scale(sc));
  const usedIn=Object.entries(UC)
    .filter(([,u])=>u.nodes.includes(d.id))
    .map(([,u])=>({label:u.title,color:u.color}));
  openPanel({
    tag:"Node Detail",accent:cc(d),
    title:d.label.replace("\n"," "),subtitle:d.desc,
    lbl1:"Used In Use Cases",nl:usedIn,
    lbl2:"Data Providers",pvs:d.pvs
  });
  document.getElementById("stl").textContent=
    `Node: ${d.label.replace("\n"," ")} · ${d.cat} · Tier ${d.tier}`;
});

// ─── FILTERS + TIDY LAYOUT ────────────────────────────────────────────────────
document.querySelectorAll(".fb").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".fb").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    applyFilter(btn.dataset.filter);
  });
});

function applyFilter(filter){
  if(filter==="all"){
    ndSel.classed("fd",false); lkSel.classed("fd",false); closePanel();
    svg.transition().duration(450).call(zoom.transform,d3.zoomIdentity);
    sim.force("radial1",d3.forceRadial(210,W/2,H/2).strength(d=>d.tier===1?.35:0))
       .force("radial2",d3.forceRadial(400,W/2,H/2).strength(d=>d.tier===2?.12:0))
       .force("radial3",d3.forceRadial(560,W/2,H/2).strength(d=>d.tier===3?.10:0))
       .force("center",d3.forceCenter(W/2,H/2).strength(0.02))
       .alpha(0.3).restart();
    document.getElementById("stl").textContent="Showing all nodes · Hover to explore · Click for detail";
    document.getElementById("str").textContent=`${NODES.length} nodes`;
    return;
  }

  const uc=UC[filter];
  const active=new Set(uc.nodes);
  ndSel.classed("fd",d=>!active.has(d.id));
  lkSel.classed("fd",d=>!active.has(d.source.id??d.source)||!active.has(d.target.id??d.target));

  // Tidy layout: place active nodes in a neat radial arrangement around center
  const an=ND.filter(d=>active.has(d.id));
  const cx=W/2, cy=H/2;

  // Group by tier
  const byTier={};
  an.forEach(d=>{
    if(!byTier[d.tier]) byTier[d.tier]=[];
    byTier[d.tier].push(d);
  });

  const radii={0:0,1:180,2:330,3:470};

  Object.entries(byTier).forEach(([tier,nodes])=>{
    const t=parseInt(tier);
    const r=radii[t]||350;
    nodes.forEach((nd,i)=>{
      const angle=(i/nodes.length)*Math.PI*2 - Math.PI/2;
      nd.fx=cx+Math.cos(angle)*r;
      nd.fy=cy+Math.sin(angle)*r;
    });
  });

  sim.alpha(0.5).restart();

  // Release fixed positions after settling
  setTimeout(()=>{
    an.forEach(d=>{d.fx=null;d.fy=null;});
    sim.alpha(0.1).restart();
  },1200);

  // Fit viewport
  setTimeout(()=>{
    const xs=an.map(d=>d.x).filter(Boolean);
    const ys=an.map(d=>d.y).filter(Boolean);
    if(!xs.length) return;
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const minY=Math.min(...ys),maxY=Math.max(...ys);
    const pw=document.getElementById("sp").classList.contains("open")?320:0;
    const vw=W-pw, vh=H;
    const dw=maxX-minX+160, dh=maxY-minY+160;
    const sc=Math.min(0.95,Math.min(vw/dw,vh/dh));
    const tcx=(minX+maxX)/2, tcy=(minY+maxY)/2;
    svg.transition().duration(700).call(zoom.transform,
      d3.zoomIdentity.translate(vw/2+pw-tcx*sc,vh/2-tcy*sc).scale(sc));
  },1400);

  openPanel({
    tag:"Use Case",accent:uc.color,title:uc.title,subtitle:uc.desc,
    lbl1:"Active Nodes",
    nl:uc.nodes.map(id=>{
      const nd=ND.find(n=>n.id===id);
      return nd?{label:nd.label.replace("\n"," "),color:cc(nd)}:null;
    }).filter(Boolean),
    lbl2:"",pvs:[]
  });
  document.getElementById("stl").textContent=`Use Case: ${uc.title} · ${an.length} nodes active`;
  document.getElementById("str").textContent=`${an.length} / ${NODES.length} nodes`;
}

// ─── ZOOM CONTROLS ────────────────────────────────────────────────────────────
document.getElementById("zIn").addEventListener("click",()=>svg.transition().duration(200).call(zoom.scaleBy,1.3));
document.getElementById("zOut").addEventListener("click",()=>svg.transition().duration(200).call(zoom.scaleBy,0.77));
document.getElementById("zReset").addEventListener("click",()=>svg.transition().duration(380).call(zoom.transform,d3.zoomIdentity));

window.addEventListener("resize",()=>{
  W=gc.clientWidth;H=gc.clientHeight;
  sim.force("center",d3.forceCenter(W/2,H/2).strength(0.02)).alpha(0.1).restart();
});
</script>
</body>
