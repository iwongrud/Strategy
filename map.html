<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overview of Domestic CRAs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d1117; color: #e6edf3;
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  header { padding: 14px 24px 12px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: #161b22; flex-shrink: 0; }
  .header-left h1 { font-size: 17px; font-weight: 600; color: #e6edf3; letter-spacing: -0.02em; }
  .header-left p  { font-size: 12px; color: #7d8590; margin-top: 2px; }
  .moodys-badge { background: #0f6e56; color: #9fe1cb; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.03em; }

  #stats { display: flex; border-bottom: 1px solid #21262d; background: #161b22; flex-shrink: 0; }
  .stat { flex: 1; padding: 10px 20px; border-right: 1px solid #21262d; text-align: center; }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 20px; font-weight: 700; color: #e6edf3; line-height: 1; margin-bottom: 3px; }
  .stat-val.green { color: #1D9E75; }
  .stat-label { font-size: 11px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.06em; }

  #controls { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid #21262d; background: #0d1117; flex-wrap: wrap; flex-shrink: 0; }
  #controls .ctrl-label { font-size: 11px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  #controls button { font-size: 12px; padding: 4px 11px; border-radius: 6px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  #controls button:hover  { background: #21262d; color: #e6edf3; border-color: #484f58; }
  #controls button.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

  #legend { display: flex; gap: 14px; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
  .leg-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
  .leg-swatch-outline { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; border: 2px solid #c0614a; background: transparent; }

  #search-wrap { position: relative; margin-left: 10px; }
  #search-input { background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-family: inherit; font-size: 12px; padding: 4px 28px 4px 10px; width: 190px; outline: none; transition: border-color 0.15s; }
  #search-input::placeholder { color: #484f58; }
  #search-input:focus { border-color: #58a6ff; }
  #search-clear { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); color: #484f58; cursor: pointer; font-size: 14px; line-height: 1; display: none; background: none; border: none; padding: 0; }
  #search-clear:hover { color: #8b949e; }
  #search-dropdown { position: absolute; top: calc(100% + 4px); left: 0; width: 230px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.6); overflow: hidden; max-height: 220px; overflow-y: auto; }
  .search-item { padding: 7px 12px; font-size: 13px; color: #c9d1d9; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
  .search-item:hover, .search-item.active { background: #21262d; color: #e6edf3; }
  .search-item .si-region { font-size: 10px; color: #484f58; margin-left: auto; background: #21262d; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .search-item .si-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .search-no-results { padding: 10px 12px; font-size: 12px; color: #484f58; }

  #map-wrap { flex: 1; position: relative; background: #0d1117; overflow: hidden; cursor: grab; min-height: 0; }
  #map-wrap:active { cursor: grabbing; }
  svg#world { width: 100%; height: 100%; display: block; }

  .country { stroke: #21262d; stroke-width: 0.4px; transition: opacity 0.2s; cursor: pointer; }
  .country:hover { opacity: 0.72; stroke: #58a6ff; stroke-width: 1px; }
  .country.has-cra-moodys { fill: #1D9E75; }
  .country.has-cra-other  { fill: #2056a8; }
  .country.no-cra         { fill: #21262d; }
  .country.na-country     { fill: #1D9E75; }
  .country.greenland-country { fill: #21262d; }
  .country.target-market  { stroke: #c0614a !important; stroke-width: 2px !important; }
  .country.target-market:hover { stroke: #d4806c !important; stroke-width: 2.5px !important; opacity: 0.8; }
  .country.highlighted    { stroke: #f0f6ff !important; stroke-width: 2.5px !important; opacity: 1 !important; }

  #tooltip { position: fixed; pointer-events: none; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 13px; font-size: 13px; color: #e6edf3; max-width: 310px; z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .t-country  { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #e6edf3; }
  .t-metrics  { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; padding: 6px 8px; background: #0d1117; border-radius: 5px; }
  .t-metric-row { display: flex; align-items: baseline; gap: 5px; font-size: 12px; }
  .t-metric-label { color: #7d8590; width: 100px; flex-shrink: 0; font-size: 11px; }
  .t-metric-val   { font-weight: 700; color: #e6edf3; font-size: 13px; }
  .t-metric-sub   { font-size: 11px; color: #7d8590; }
  .t-no-data { font-size: 11px; color: #484f58; font-style: italic; }
  .t-region { font-size: 11px; color: #7d8590; margin-bottom: 5px; }
  .t-cra    { padding: 3px 0; border-bottom: 1px solid #21262d; font-size: 12px; color: #c9d1d9; }
  .t-cra:last-child { border-bottom: none; }
  .t-more   { font-size: 11px; color: #7d8590; margin-top: 4px; }
  .t-rec-tag  { display: inline-block; background: #2a1810; color: #d4806c; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; border: 1px solid #c0614a; margin-bottom: 6px; }
  .t-rec-text { font-size: 12px; color: #a0b0c0; line-height: 1.5; margin-top: 4px; border-top: 1px solid #21262d; padding-top: 6px; }

  .aff-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; font-weight: 600; }
  .aff-moodys { background: #0d3026; color: #56d364; }
  .aff-fitch  { background: #3d1a00; color: #ffa657; }
  .aff-sp     { background: #0d2149; color: #79c0ff; }
  .aff-ind    { background: #1c2128; color: #8b949e; }

  #zoom-controls { position: absolute; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
  #zoom-controls button { width: 30px; height: 30px; font-size: 16px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: background 0.15s; }
  #zoom-controls button:hover { background: #21262d; }

  #panel { position: absolute; top: 12px; left: 12px; width: 310px; max-height: calc(100% - 24px); background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 20; display: none; flex-direction: column; }
  #panel.open { display: flex; }
  #panel-header { padding: 12px 14px 10px; border-bottom: 1px solid #21262d; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; background: #0d1117; flex-shrink: 0; }
  #panel-title  { font-size: 15px; font-weight: 600; color: #e6edf3; line-height: 1.3; }
  #panel-region-badge { display: inline-block; font-size: 10px; color: #7d8590; background: #21262d; padding: 2px 7px; border-radius: 10px; margin-top: 3px; }
  #close-panel { background: none; border: none; color: #7d8590; cursor: pointer; font-size: 20px; line-height: 1; padding: 0; flex-shrink: 0; }
  #close-panel:hover { color: #e6edf3; }
  #panel-rec { padding: 10px 14px; border-bottom: 1px solid #21262d; background: #1c1310; flex-shrink: 0; display: none; }
  .panel-rec-tag  { display: inline-block; background: #2a1810; color: #d4806c; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px; border: 1px solid #c0614a; margin-bottom: 6px; }
  .panel-rec-text { font-size: 12px; color: #c0c8d0; line-height: 1.55; }
  #panel-metrics { padding: 10px 14px; border-bottom: 1px solid #21262d; background: #0d1117; flex-shrink: 0; }
  .panel-metrics-label { font-size: 11px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .panel-metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .panel-metric-card { background: #161b22; border: 0.5px solid #30363d; border-radius: 6px; padding: 7px 9px; }
  .panel-metric-card .pmc-label { font-size: 10px; color: #7d8590; margin-bottom: 3px; }
  .panel-metric-card .pmc-val   { font-size: 14px; font-weight: 700; color: #e6edf3; line-height: 1.2; }
  .panel-metric-card .pmc-sub   { font-size: 10px; color: #7d8590; margin-top: 1px; }
  .panel-no-data { font-size: 11px; color: #484f58; font-style: italic; }
  #panel-body { overflow-y: auto; padding: 6px 0; flex: 1; }
  .cra-row { padding: 8px 14px; border-bottom: 1px solid #21262d; }
  .cra-row:last-child { border-bottom: none; }
  .cra-name { font-size: 13px; font-weight: 500; color: #e6edf3; margin-bottom: 3px; }
  .cra-meta { font-size: 11px; color: #7d8590; line-height: 1.4; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-left: 5px; vertical-align: middle; }
  .badge-moodys { background: #0d3026; color: #56d364; }
  .badge-fitch  { background: #3d1a00; color: #ffa657; }
  .badge-sp     { background: #0d2149; color: #79c0ff; }
  .badge-ind    { background: #1c2128; color: #8b949e; }
  #no-cra-msg { padding: 14px; font-size: 13px; color: #7d8590; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Overview of Domestic CRAs</h1>
    <p>56 countries &nbsp;&middot;&nbsp; 141 local CRAs &nbsp;&middot;&nbsp; GDP &amp; debt issuance: IMF WEO Oct 2025 / BIS / OECD GDR 2025</p>
  </div>
  <span class="moodys-badge">Moody's Intelligence</span>
</header>

<div id="stats">
  <div class="stat"><div class="stat-val">56</div><div class="stat-label">Countries w/ CRAs</div></div>
  <div class="stat"><div class="stat-val">141</div><div class="stat-label">Total Local CRAs</div></div>
  <div class="stat"><div class="stat-val green">26</div><div class="stat-label">Moody's Presence</div></div>
  <div class="stat"><div class="stat-val">3</div><div class="stat-label">Regions</div></div>
</div>

<div id="controls">
  <span class="ctrl-label">Filter:</span>
  <button class="active" id="btn-all"    onclick="setFilter('all')">All</button>
  <button id="btn-moodys" onclick="setFilter('moodys')">Moody's Only</button>
  <button id="btn-fitch"  onclick="setFilter('fitch')">Fitch Only</button>
  <button id="btn-sp"     onclick="setFilter('sp')">S&amp;P Only</button>
  <button id="btn-apac"   onclick="setFilter('APAC')">APAC</button>
  <button id="btn-emea"   onclick="setFilter('EMEA')">EMEA</button>
  <button id="btn-latam"  onclick="setFilter('LATAM')">LATAM</button>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="&#128269; Search country..." autocomplete="off" />
    <button id="search-clear" onclick="clearSearch()" title="Clear">&#215;</button>
    <div id="search-dropdown"></div>
  </div>
  <div id="legend">
    <div class="leg-item"><span class="leg-swatch" style="background:#1D9E75;"></span>Moody's Presence</div>
    <div class="leg-item"><span class="leg-swatch" style="background:#2056a8;"></span>Markets w/o Moody's</div>
    <div class="leg-item"><span class="leg-swatch" style="background:#21262d;border:1px solid #484f58;"></span>No local CRA</div>
    <div class="leg-item"><span class="leg-swatch-outline"></span>Potential New Markets</div>
  </div>
</div>

<div id="map-wrap">
  <svg id="world"></svg>
  <div id="zoom-controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">&#8722;</button>
    <button onclick="resetZoom()" style="font-size:13px;">&#8962;</button>
  </div>
  <div id="panel">
    <div id="panel-header">
      <div><div id="panel-title"></div><div id="panel-region-badge"></div></div>
      <button id="close-panel" onclick="closePanel()">&#215;</button>
    </div>
    <div id="panel-rec"></div>
    <div id="panel-metrics"></div>
    <div id="panel-body"></div>
  </div>
  <div id="tooltip"></div>
</div>

const DEBT_NAME_MAP = { "UK": "United Kingdom", "Hong Kong": "Hong Kong SAR" };

const NA_COUNTRIES   = new Set(["United States","Canada"]);
const GREENLAND_SET  = new Set(["Greenland"]);
const TARGET_MARKETS = new Set(["Indonesia","Saudi Arabia","Turkey","Philippines"]);
const ALL_COUNTRIES  = Object.keys(CRA_DATA).sort();

let currentFilter = 'all', svgEl, g, projection, path, zoom, searchActiveIdx = -1;

function getCN(r)      { return NAME_MAP[r] || r; }
function getGdpKey(cn) { return GDP_NAME_MAP[cn] || cn; }
function getDebtKey(cn){ return DEBT_NAME_MAP[cn] || GDP_NAME_MAP[cn] || cn; }

function hasMoodys(cn) { const d=CRA_DATA[cn]; return d&&d.cras.some(c=>c.affiliation&&c.affiliation.toLowerCase().includes("moody")); }

function getClass(cn) {
  if (NA_COUNTRIES.has(cn))  return 'na-country';
  if (GREENLAND_SET.has(cn)) return 'greenland-country';
  const d=CRA_DATA[cn]; if(!d) return 'no-cra';
  return hasMoodys(cn)?'has-cra-moodys':'has-cra-other';
}

function hasFitch(cn) { const d=CRA_DATA[cn]; return d&&d.cras.some(c=>c.affiliation&&c.affiliation.toLowerCase().includes("fitch")); }
function hasSP(cn)    { const d=CRA_DATA[cn]; return d&&d.cras.some(c=>c.affiliation&&(c.affiliation.toLowerCase().includes("s&p")||c.affiliation.toLowerCase().includes("crisil"))); }

function isVisible(cn) {
  if (NA_COUNTRIES.has(cn)||GREENLAND_SET.has(cn)) return true;
  const d=CRA_DATA[cn];
  if (currentFilter==='all') return true;
  if (currentFilter==='moodys') return !!(d&&hasMoodys(cn));
  if (currentFilter==='fitch')  return !!(d&&hasFitch(cn));
  if (currentFilter==='sp')     return !!(d&&hasSP(cn));
  if (['APAC','EMEA','LATAM'].includes(currentFilter)) return !!(d&&d.region===currentFilter);
  return true;
}

function setFilter(f) {
  currentFilter=f;
  ['btn-all','btn-moodys','btn-fitch','btn-sp','btn-apac','btn-emea','btn-latam'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const map={all:'btn-all',moodys:'btn-moodys',fitch:'btn-fitch',sp:'btn-sp',APAC:'btn-apac',EMEA:'btn-emea',LATAM:'btn-latam'};
  document.getElementById(map[f]).classList.add('active');
  g.selectAll('.country').attr('opacity',d=>isVisible(d._resolvedName||'')?1:0.08);
}

function affBadgeHtml(aff) {
  if(!aff) return '';
  const a=aff.toLowerCase();
  let cls='aff-ind';
  if(a.includes("moody")) cls='aff-moodys';
  else if(a.includes("fitch")) cls='aff-fitch';
  else if(a.includes("s&p")) cls='aff-sp';
  return `<span class="aff-badge ${cls}">${aff}</span>`;
}

function fmtGDP(val) { return val>=1000?'$'+(val/1000).toFixed(1)+'T':'$'+val.toFixed(1)+'B'; }
function fmtDebt(val) {
  if(val===null||val===undefined) return null;
  if(val>=1000) return '$'+(val/1000).toFixed(1)+'T';
  if(val>=100)  return '$'+Math.round(val)+'B';
  if(val>=10)   return '$'+val.toFixed(1)+'B';
  return '$'+val.toFixed(1)+'B';
}
function gdpColor(g) { return g>=4?'#56d364':g>=2?'#79c0ff':g<0?'#f85149':'#8b949e'; }

// ── Tooltip ──────────────────────────────────────────────────────────
function showTooltip(event, cn) {
  const d    = CRA_DATA[cn];
  const gdp  = GDP_DATA[getGdpKey(cn)];
  const debt = DEBT_DATA[getDebtKey(cn)];
  const tt   = document.getElementById('tooltip');
  const isNA = NA_COUNTRIES.has(cn), isGL = GREENLAND_SET.has(cn);

  let html = `<div class="t-country">${cn}</div>`;

  // Metrics block — always shown
  const gc   = gdp ? gdpColor(gdp.growth) : null;
  const sign = gdp && gdp.growth>=0 ? '+' : '';
  const debtFmt = fmtDebt(debt);

  html += `<div class="t-metrics">`;
  if (gdp) {
    html += `<div class="t-metric-row">
      <span class="t-metric-label">GDP</span>
      <span class="t-metric-val">${fmtGDP(gdp.gdp)}</span>
    </div>
    <div class="t-metric-row">
      <span class="t-metric-label">2025 Growth</span>
      <span class="t-metric-val" style="color:${gc}">${sign}${gdp.growth}%</span>
    </div>`;
  } else {
    html += `<div class="t-no-data">GDP — Data not available</div>`;
  }
  if (debtFmt) {
    html += `<div class="t-metric-row">
      <span class="t-metric-label">2024 Debt Issuance</span>
      <span class="t-metric-val">${debtFmt}</span>
    </div>`;
  } else {
    html += `<div class="t-metric-row">
      <span class="t-metric-label">2024 Debt Issuance</span>
      <span class="t-no-data">N/A</span>
    </div>`;
  }
  html += `</div>`;

  // Early return for NA/Greenland — no CRA section
  if (isNA || isGL) { tt.innerHTML=html; tt.style.display='block'; posTooltip(event,tt); return; }

  if (TARGET_MARKETS.has(cn)) html += `<div class="t-rec-tag">&#9733; Potential New Market</div>`;

  if (d) {
    html += `<div class="t-region">${d.region} &nbsp;&middot;&nbsp; ${d.cras.length} CRA${d.cras.length>1?'s':''}</div>`;
    d.cras.slice(0,4).forEach(c=>{html+=`<div class="t-cra">${c.name}${c.affiliation?affBadgeHtml(c.affiliation):''}</div>`;});
    if(d.cras.length>4) html+=`<div class="t-more">+${d.cras.length-4} more &mdash; click to expand</div>`;
  } else {
    html+=`<div style="font-size:12px;color:#7d8590;margin-top:2px;">No local CRAs on record</div>`;
  }
  if(TARGET_MARKETS.has(cn)&&RECOMMENDATIONS[cn]) html+=`<div class="t-rec-text">${RECOMMENDATIONS[cn]}</div>`;

  tt.innerHTML=html; tt.style.display='block'; posTooltip(event,tt);
}

function posTooltip(event, tt) {
  let x=event.clientX+14, y=event.clientY+14;
  if(x+320>window.innerWidth)  x=event.clientX-325;
  if(y+280>window.innerHeight) y=event.clientY-285;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

// ── Detail Panel ──────────────────────────────────────────────────────
function showPanel(cn) {
  const d    = CRA_DATA[cn];
  const gdp  = GDP_DATA[getGdpKey(cn)];
  const debt = DEBT_DATA[getDebtKey(cn)];

  document.getElementById('panel-title').textContent = cn;
  document.getElementById('panel-region-badge').textContent = d?d.region:'';

  // Recommendation block
  const recEl = document.getElementById('panel-rec');
  if(TARGET_MARKETS.has(cn)&&RECOMMENDATIONS[cn]) {
    recEl.innerHTML=`<div class="panel-rec-tag">&#9733; Potential New Market &mdash; Moody's Recommendation</div><div class="panel-rec-text">${RECOMMENDATIONS[cn]}</div>`;
    recEl.style.display='block';
  } else { recEl.style.display='none'; }

  // Metrics grid: GDP | Growth | Debt Issuance
  const metricsEl = document.getElementById('panel-metrics');
  const gc   = gdp?gdpColor(gdp.growth):null;
  const sign = gdp&&gdp.growth>=0?'+':'';
  const debtFmt = fmtDebt(debt);
  metricsEl.innerHTML = `
    <div class="panel-metrics-label">Key Metrics &nbsp;&middot;&nbsp; 2024–2025</div>
    <div class="panel-metrics-grid">
      <div class="panel-metric-card">
        <div class="pmc-label">GDP</div>
        <div class="pmc-val">${gdp?fmtGDP(gdp.gdp):'—'}</div>
        <div class="pmc-sub">2025E</div>
      </div>
      <div class="panel-metric-card">
        <div class="pmc-label">Growth</div>
        <div class="pmc-val" style="color:${gc||'#8b949e'}">${gdp?sign+gdp.growth+'%':'—'}</div>
        <div class="pmc-sub">2025E</div>
      </div>
      <div class="panel-metric-card">
        <div class="pmc-label">Debt Issuance</div>
        <div class="pmc-val">${debtFmt||'N/A'}</div>
        <div class="pmc-sub">2024A</div>
      </div>
    </div>`;
  metricsEl.style.display='block';

  // CRA list
  const body=document.getElementById('panel-body');
  if(!d) { body.innerHTML='<div id="no-cra-msg">No local CRAs on record for this country.</div>'; }
  else {
    body.innerHTML=d.cras.map(c=>{
      const rankStr=c.rank?`Rank #${c.rank}`:'';
      let bCls='badge-ind';
      if(c.affiliation){const a=c.affiliation.toLowerCase();if(a.includes("moody"))bCls='badge-moodys';else if(a.includes("fitch"))bCls='badge-fitch';else if(a.includes("s&p"))bCls='badge-sp';}
      const badgeHtml=c.affiliation?`<span class="badge ${bCls}">${c.affiliation}</span>`:'';
      const meta=[rankStr,c.commentary].filter(Boolean).join(' &middot; ');
      return `<div class="cra-row"><div class="cra-name">${c.name}${badgeHtml}</div>${meta?`<div class="cra-meta">${meta}</div>`:''}</div>`;
    }).join('');
  }
  document.getElementById('panel').classList.add('open');
}

function closePanel() { document.getElementById('panel').classList.remove('open'); g.selectAll('.country').classed('highlighted',false); }
function zoomIn()    { svgEl.transition().duration(300).call(zoom.scaleBy,1.5); }
function zoomOut()   { svgEl.transition().duration(300).call(zoom.scaleBy,0.67); }
function resetZoom() { svgEl.transition().duration(400).call(zoom.transform,d3.zoomIdentity); }

function zoomToCountry(cn) {
  const coords=CENTROIDS[cn]; if(!coords||!projection) return;
  const [lat,lng]=coords,[px,py]=projection([lng,lat]);
  const W=960,H=500,scale=4;
  svgEl.transition().duration(700).call(zoom.transform,d3.zoomIdentity.translate(W/2-scale*px,H/2-scale*py).scale(scale));
  g.selectAll('.country').classed('highlighted',d=>d._resolvedName===cn);
}

function dotColor(cn){if(TARGET_MARKETS.has(cn))return'#c0614a';return hasMoodys(cn)?'#1D9E75':'#2056a8';}

function renderDropdown(matches) {
  const dd=document.getElementById('search-dropdown');
  if(!matches.length){dd.innerHTML='<div class="search-no-results">No countries found</div>';dd.style.display='block';return;}
  dd.innerHTML=matches.map((cn,i)=>{
    const region=CRA_DATA[cn]?CRA_DATA[cn].region:'';
    const dotStyle=TARGET_MARKETS.has(cn)?`border:2px solid #c0614a;background:transparent;`:`background:${dotColor(cn)};`;
    return `<div class="search-item" data-idx="${i}" onmousedown="selectCountry('${cn.replace(/'/g,"\'")}')"><span class="si-dot" style="${dotStyle}"></span>${cn}${region?`<span class="si-region">${region}</span>`:''}</div>`;
  }).join('');
  searchActiveIdx=-1; dd.style.display='block';
}

function hideDropdown(){document.getElementById('search-dropdown').style.display='none';searchActiveIdx=-1;}

function selectCountry(cn) {
  document.getElementById('search-input').value=cn;
  document.getElementById('search-clear').style.display='block';
  hideDropdown(); showPanel(cn); zoomToCountry(cn);
}

function clearSearch() {
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').style.display='none';
  hideDropdown(); g.selectAll('.country').classed('highlighted',false);
}

document.addEventListener('DOMContentLoaded',()=>{
  const input=document.getElementById('search-input');
  input.addEventListener('input',()=>{
    const val=input.value.trim().toLowerCase();
    document.getElementById('search-clear').style.display=val?'block':'none';
    if(!val){hideDropdown();return;}
    const matches=ALL_COUNTRIES.filter(cn=>cn.toLowerCase().includes(val))
      .sort((a,b)=>{const at=TARGET_MARKETS.has(a)?0:1,bt=TARGET_MARKETS.has(b)?0:1;return at-bt||a.localeCompare(b);})
      .slice(0,10);
    renderDropdown(matches);
  });
  input.addEventListener('keydown',e=>{
    const dd=document.getElementById('search-dropdown');
    const items=dd.querySelectorAll('.search-item');
    if(!items.length) return;
    if(e.key==='ArrowDown'){e.preventDefault();searchActiveIdx=Math.min(searchActiveIdx+1,items.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();searchActiveIdx=Math.max(searchActiveIdx-1,0);}
    else if(e.key==='Enter'){if(searchActiveIdx>=0)items[searchActiveIdx].dispatchEvent(new MouseEvent('mousedown'));else if(items.length===1)items[0].dispatchEvent(new MouseEvent('mousedown'));return;}
    else if(e.key==='Escape'){hideDropdown();return;}
    else return;
    items.forEach((el,i)=>el.classList.toggle('active',i===searchActiveIdx));
    if(searchActiveIdx>=0)items[searchActiveIdx].scrollIntoView({block:'nearest'});
  });
  input.addEventListener('focus',()=>{
    const val=input.value.trim().toLowerCase();
    if(val)renderDropdown(ALL_COUNTRIES.filter(cn=>cn.toLowerCase().includes(val)).slice(0,10));
  });
  document.addEventListener('click',e=>{if(!document.getElementById('search-wrap').contains(e.target))hideDropdown();});
});

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(world=>{
    const countries=topojson.feature(world,world.objects.countries);
    svgEl=d3.select('#world');
    const W=960,H=500;
    projection=d3.geoNaturalEarth1().scale(153).translate([W/2,H/2]);
    path=d3.geoPath().projection(projection);
    svgEl.attr('viewBox',`0 0 ${W} ${H}`);
    g=svgEl.append('g');
    zoom=d3.zoom().scaleExtent([1,10]).on('zoom',e=>g.attr('transform',e.transform));
    svgEl.call(zoom);

    fetch('https://cdn.jsdelivr.net/gh/lukes/ISO-3166-Countries-with-Regional-Codes@master/all/all.json')
      .then(r=>r.json()).catch(()=>[])
      .then(namesData=>{
        const idToName={};
        if(Array.isArray(namesData))namesData.forEach(n=>{if(n['country-code']&&n.name)idToName[parseInt(n['country-code'])]=getCN(n.name);});

        g.selectAll('.country')
          .data(countries.features)
          .enter().append('path')
          .each(function(d){d._resolvedName=idToName[+d.id]||getCN((d.properties&&d.properties.name)||'');})
          .attr('class',d=>'country '+getClass(d._resolvedName)+(TARGET_MARKETS.has(d._resolvedName)?' target-market':''))
          .attr('d',path)
          .on('mousemove',function(event,d){showTooltip(event,d._resolvedName);})
          .on('mouseleave',hideTooltip)
          .on('click',function(event,d){
            const cn=d._resolvedName;
            if(NA_COUNTRIES.has(cn)||GREENLAND_SET.has(cn))return;
            showPanel(cn);zoomToCountry(cn);hideTooltip();
          });

        g.append('path')
          .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
          .attr('fill','none').attr('stroke','#21262d').attr('stroke-width','0.5px').attr('d',path);
      });
  });
</script>
</body>
</html>
