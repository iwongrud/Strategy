<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRA Intelligence Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 14px 24px 0;
      flex-shrink: 0;
    }

    .site-title {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #7d8590;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: #e6edf3;
    }

    .tab-btn.active {
      color: #e6edf3;
      border-bottom-color: #1D9E75;
    }

    /* ── Content area ── */
    .tab-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }

    /* ── Placeholder shown when file not yet uploaded ── */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #7d8590;
    }

    .placeholder-icon {
      font-size: 40px;
      opacity: 0.4;
    }

    .placeholder h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }

    .placeholder p {
      font-size: 13px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    .placeholder code {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #9fe1cb;
      font-size: 12px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>

  <header>
    <div class="site-title">CRA Intelligence Hub</div>
    <nav class="tab-bar">
      <!-- =====================================================
           ADD NEW TABS HERE
           Copy one <button> line below, give it a unique
           data-tab value (e.g. "tab3", "tab4", etc.)
           ===================================================== -->
      <button class="tab-btn active" data-tab="tab1">Local CRA Map</button>
      <button class="tab-btn"        data-tab="tab2">Knowledge Graph</button>
    </nav>
  </header>

  <!-- =========================================================
       ADD NEW TAB PANELS HERE
       Copy one <div class="tab-content"> block below and
       match its id to your new data-tab value.
       Replace src="..." with your new file name.
       ========================================================= -->

  <!-- Tab 1: Local CRA Map -->
  <div class="tab-content active" id="tab1">
    <iframe src="map.html" title="Local CRA Map"></iframe>
  </div>

  <!-- Tab 2: Knowledge Graph -->
  <div class="tab-content" id="tab2">
    <!--
      When you have your Knowledge Graph HTML file ready:
        1. Upload it to GitHub alongside this file
        2. Delete the placeholder <div> block below
        3. Uncomment the <iframe> line (remove the  and  markers)
    -->
    <!-- <iframe src="knowledge-graph.html" title="Knowledge Graph"></iframe> -->
    <div class="placeholder">
      <div class="placeholder-icon">&#128376;</div>
      <h2>Knowledge Graph</h2>
      <p>
        Upload your file as <code>knowledge-graph.html</code> to this
        repository, then follow the instructions in this file's comments
        to activate this tab.
      </p>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const panels  = document.querySelectorAll('.tab-content');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        buttons.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(target).classList.add('active');
      });
    });
  </script>

</body>
</html>
